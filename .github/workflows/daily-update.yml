name: Daily Repository Update

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: 23f2005015@ds.study.iitm.ac.in - Update repository
        run: |
          echo "Last updated on $(date -u)" >> daily-log.txt

      - name: Commit Changes
        run: |
          git config user.name "github-actions"
          git config user.email "23f2005015@ds.study.iitm.ac.in"
          echo "Updated at $(date -u +%Y-%m-%dT%H:%M:%SZ)" > update.log
          git add update.log
          git commit --date="$(date -u)" -m "Automated daily update $(date -u)"
          git push

      - name: Push changes
        run: |
          git push
